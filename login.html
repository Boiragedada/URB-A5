<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="shortcut icon" href="github-icon.png" type="image/x-icon">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 flex item-center justify-center h-screen">
    <div class="bg-white p-8 w-96 rounded-ig shadow">
        <div class="text-center">
            <img src="assets/github-logo.png" class="w-16 mx-auto" alt="">
            <h2 class="text-2xl font-bold mt-2">Github Issues Tracker</h2>
            <p class="text-gray-500">Sine in to manage your issues</p>
        </div>
        <div class="mt-6">
            <label>Username</label>
            <input id="username" class="border w-full p-2 rounded mt-1" placeholder="Enter Username">
        </div>
        <div class="mt-6">
            <label>Password</label>
            <input id="password" class="border w-full p-2 rounded mt-1" placeholder="Enter password">
        </div>
        <button onclick="login()" class="w-full mt-6 bg-purple-600 text-white py-2 rounded">Sine In</button>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
